<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Depy - IA com Aura Viva</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: radial-gradient(circle at top, #0b0b1a, #050510);
  color: white;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.container {
  text-align: center;
  max-width: 800px;
  padding: 20px;
}

.logo {
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 4px;
  margin-bottom: 10px;
  color: #7c5cff;
  text-shadow: 0 0 20px #7c5cff;
}

.subtitle {
  font-size: 18px;
  opacity: 0.8;
  margin-bottom: 40px;
}

.aura {
  width: 180px;
  height: 180px;
  margin: 0 auto 40px;
  border-radius: 50%;
  background: radial-gradient(circle, #7c5cff, #00d4ff, #ff7a18);
  animation: pulse 2.5s infinite;
  box-shadow: 0 0 60px rgba(124, 92, 255, 0.6);
}

@keyframes pulse {
  0% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.2); filter: brightness(1.4); }
  100% { transform: scale(1); filter: brightness(1); }
}

.buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  padding: 14px 28px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.primary {
  background: linear-gradient(90deg, #7c5cff, #00d4ff);
  color: white;
  box-shadow: 0 0 20px rgba(124, 92, 255, 0.4);
}

.secondary {
  background: transparent;
  border: 1px solid #7c5cff;
  color: #7c5cff;
}

.btn:hover {
  transform: scale(1.05);
}

.features {
  margin-top: 40px;
  font-size: 14px;
  opacity: 0.7;
}

  </style>
</head>
<body>
  <div class="container">
    <div class="logo">DEPY</div>
    <div class="subtitle">Uma IA com presença. Uma aura que responde você.</div><div class="aura"></div>

<div class="buttons">
  <button class="btn primary" onclick="alert('Entrar no Depy (fluxo gratuito)')">Começar Grátis</button>
  <button class="btn secondary" onclick="alert('Página Pro em breve')">Versão Pro</button>
</div>

<div class="features">
  Conversa inteligente • Experiência emocional • Interface viva
</div>

  </div>
</body>
</html>
