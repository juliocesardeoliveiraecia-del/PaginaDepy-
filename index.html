<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depy</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
  background: radial-gradient(circle at top,#0b0b1a,#050510);
  color:white;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.container{max-width:800px;padding:20px;}

.logo{
  width:240px;
  margin-bottom:30px;
  animation:float 5s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-12px) scale(1.03)}
  100%{transform:translateY(0) scale(1)}
}

.headline{font-size:28px;font-weight:bold;margin-bottom:15px;}
.sub{font-size:16px;opacity:.7;margin-bottom:40px;}

.btn{
  padding:16px 32px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-size:16px;
  background:linear-gradient(90deg,#7c5cff,#00d4ff);
  color:white;
  box-shadow:0 0 25px rgba(124,92,255,.5);
  transition:.3s;
}

.btn:hover{transform:scale(1.05);}

.footer{margin-top:40px;font-size:14px;opacity:.5;}
</style></head><body>
<div class="container"><!-- LOGO PREMIUM (AURA REALISTA) --><svg class="logo" viewBox="0 0 300 300"><defs>
  <radialGradient id="core" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#0b0b1a" stop-opacity="1"/>
  </radialGradient>  <radialGradient id="aura" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7c5cff"/>
    <stop offset="40%" stop-color="#00d4ff"/>
    <stop offset="75%" stop-color="#ff7a18"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs><!-- aura externa --><circle cx="150" cy="150" r="100" fill="url(#aura)" filter="url(#glow)">
  <animate attributeName="r" values="95;105;95" dur="4s" repeatCount="indefinite"/>
</circle><!-- núcleo --><circle cx="150" cy="150" r="60" fill="url(#core)"/><!-- texto --><text x="50%" y="53%" text-anchor="middle" fill="#0b0b1a" font-size="36" font-weight="bold" dy=".3em">
  Depy
</text></svg><div class="headline">
Cada vez mais pessoas estão descobrindo o Depy.<br>
Agora é a sua vez.
</div><div class="sub">
Uma inteligência que responde… e evolui com você.
</div><button class="btn" onclick="window.location.href='https://depy-app.vercel.app'">
Acessar o Depy
</button><div class="footer">
O Depy não é fixo. Ele muda com você.
</div></div>
</body>
</html>
